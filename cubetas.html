<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Control de Cubetas</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root{
  --bg:#f2f0eb;--surface:#fff;--surface2:#f7f5f1;--surface3:#eeebe5;
  --border:#dedad2;--border2:#c8c4bb;
  --text:#18170f;--text2:#5e5c55;--text3:#9e9b94;
  --green:#1f6b42;--green-bg:#e8f4ee;--green-text:#145030;
  --red:#b83225;--red-bg:#fcecea;--red-text:#7d1f16;
  --amber:#906000;--amber-bg:#fdf5dc;--amber-text:#604000;
  --blue:#1a4fa0;--blue-bg:#eaf0fc;--blue-text:#102e6a;
  --dark:#1f2937;--dark-text:#f9fafb;
  --radius:10px;--radius-sm:6px;
  --shadow:0 1px 4px rgba(0,0,0,.08),0 6px 16px rgba(0,0,0,.05);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px}

header{background:var(--surface);border-bottom:1px solid var(--border);padding:12px 24px;
  display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:200;gap:12px;flex-wrap:wrap}
.logo{display:flex;align-items:center;gap:10px}
.logo-icon{width:34px;height:34px;background:var(--green);border-radius:8px;
  display:flex;align-items:center;justify-content:center;color:#fff;font-size:18px}
.logo-name{font-size:15px;font-weight:600;letter-spacing:-.02em}
.logo-sub{font-size:11px;color:var(--text3)}
.hdr-actions{display:flex;align-items:center;gap:8px;flex-wrap:wrap}

.btn{padding:7px 16px;border-radius:var(--radius-sm);font-family:'DM Sans',sans-serif;
  font-size:13px;font-weight:500;cursor:pointer;border:1px solid var(--border2);
  background:var(--surface);color:var(--text);transition:all .14s;white-space:nowrap}
.btn:hover{background:var(--surface2)}
.btn-green{background:var(--green);color:#fff;border-color:var(--green)}
.btn-green:hover{background:var(--green-text);border-color:var(--green-text)}
.btn-blue{background:var(--blue-bg);color:var(--blue-text);border-color:#b8ccf4}
.btn-blue:hover{background:#d9e7ff}
.btn-red{background:var(--red-bg);color:var(--red-text);border-color:#f0b5ae}
.btn-red:hover{background:#fad9d5}
.btn-amber{background:var(--amber-bg);color:var(--amber-text);border-color:#e8d090}
.btn-amber:hover{background:#faedc0}
.btn-sm{padding:5px 10px;font-size:12px}
.btn-xs{padding:3px 7px;font-size:11px}

.wrap{max-width:1400px;margin:0 auto;padding:20px 24px;display:flex;flex-direction:column;gap:20px}

.cuadro{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
  box-shadow:var(--shadow);overflow:hidden}
.cuadro-head{padding:10px 16px;border-bottom:1px solid var(--border);background:var(--surface2);
  display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.cuadro-num{background:var(--dark);color:var(--dark-text);font-family:'DM Mono',monospace;
  font-size:11px;font-weight:700;padding:3px 9px;border-radius:6px;letter-spacing:.05em}
.cuadro-fecha{font-family:'DM Mono',monospace;font-size:13px;font-weight:600}
.cuadro-nota{font-size:11px;color:var(--text2);font-style:italic}
.cuadro-actions{margin-left:auto;display:flex;gap:6px}

.conc-badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;
  border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap}
.conc-ok{background:var(--green-bg);color:var(--green-text)}
.conc-err{background:var(--red-bg);color:var(--red-text)}
.conc-nd{background:var(--surface3);color:var(--text3)}

.tscroll{overflow-x:auto;-webkit-overflow-scrolling:touch}

table.ct{width:100%;border-collapse:collapse;font-size:12px;min-width:780px}
table.ct th{padding:7px 10px;font-size:10px;font-weight:600;text-transform:uppercase;
  letter-spacing:.05em;color:var(--text3);border-bottom:1px solid var(--border);
  background:var(--surface2);text-align:center;white-space:nowrap}
table.ct th.th-r{text-align:left;min-width:80px}
table.ct th.sec-o{background:#fff5f4;color:var(--red-text)}
table.ct th.sec-i{background:#f0f8f3;color:var(--green-text)}
table.ct th.sec-d{background:#fff8e6;color:var(--amber-text)}
table.ct td{padding:0;border-bottom:1px solid var(--border);text-align:center;vertical-align:middle}
table.ct td.td-r{padding:7px 12px;text-align:left;font-weight:600;background:var(--surface2);
  border-right:2px solid var(--border2);white-space:nowrap}
table.ct tr:last-child td{border-bottom:none}

.rpill{display:inline-block;padding:2px 8px;border-radius:8px;font-size:12px;
  font-weight:700;font-family:'DM Mono',monospace;background:var(--green-bg);color:var(--green-text)}
.spill{display:block;font-size:9px;font-weight:500;color:var(--amber-text);
  background:var(--amber-bg);border-radius:4px;padding:1px 3px;margin-top:2px;text-align:center}

.num-input{width:60px;font-family:'DM Mono',monospace;font-size:14px;font-weight:600;
  text-align:center;padding:5px 3px;border:1px solid var(--border2);border-radius:5px;
  background:var(--surface);color:inherit;-moz-appearance:textfield;transition:border-color .12s}
.num-input::-webkit-inner-spin-button,.num-input::-webkit-outer-spin-button{-webkit-appearance:none}
.num-input:focus{outline:none;border-color:var(--green);box-shadow:0 0 0 2px rgba(31,107,66,.15)}
.inp-o .num-input{color:var(--red-text);background:#fffaf9}
.inp-i .num-input{color:var(--green-text);background:#f8fcf9}
.cell-p{padding:5px 5px;display:flex;align-items:center;justify-content:center}

.td-so{background:#fff0ee!important;font-family:'DM Mono',monospace;font-weight:700;font-size:13px;color:var(--red-text);padding:5px 8px!important}
.td-si{background:#eef8f2!important;font-family:'DM Mono',monospace;font-weight:700;font-size:13px;color:var(--green-text);padding:5px 8px!important}
.td-df{padding:5px 8px!important;min-width:90px}

.diff-pill{display:inline-flex;align-items:center;gap:3px;padding:3px 8px;border-radius:8px;
  font-family:'DM Mono',monospace;font-size:12px;font-weight:700;white-space:nowrap}
.dp-ok{background:var(--green-bg);color:var(--green-text)}
.dp-pos{background:#fce7f3;color:#9d174d}
.dp-neg{background:var(--red-bg);color:var(--red-text)}
.dp-nd{background:var(--surface3);color:var(--text3);font-size:11px}

.tr-tot-c td{background:var(--dark)!important;color:var(--dark-text);font-family:'DM Mono',monospace;
  font-weight:600;font-size:13px;border-bottom:none;padding:8px 10px;text-align:center}
.tr-tot-c .td-rl{text-align:left;font-size:10px;font-weight:700;letter-spacing:.04em;
  padding:8px 14px;border-right:2px solid #374151;background:var(--dark)!important}

.conc-detail{padding:10px 16px;background:#fffdf5;border-top:1px solid var(--border);
  font-size:11px;display:flex;gap:16px;flex-wrap:wrap;align-items:center}
.conc-item{display:flex;gap:5px;align-items:center}
.conc-ri{font-family:'DM Mono',monospace;font-weight:700;font-size:11px;
  background:var(--green-bg);color:var(--green-text);padding:1px 6px;border-radius:5px}
.ci-ok{color:var(--green-text)}
.ci-err{color:var(--red-text)}

.sep-arrow{display:flex;align-items:center;justify-content:center;gap:8px;
  color:var(--text3);font-size:11px;font-weight:500}
.sep-line{flex:1;height:1px;background:var(--border2);max-width:200px}

.add-panel{background:var(--surface);border:2px dashed var(--border2);border-radius:var(--radius);
  padding:20px;display:flex;align-items:center;justify-content:center;gap:12px;cursor:pointer;
  transition:border-color .14s,background .14s}
.add-panel:hover{border-color:var(--green);background:var(--green-bg)}
.add-panel-txt{font-size:13px;color:var(--text2);font-weight:500}

.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:500;
  display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s}
.modal-bg.open{opacity:1;pointer-events:all}
.modal{background:var(--surface);border-radius:var(--radius);padding:24px;width:320px;
  box-shadow:0 8px 40px rgba(0,0,0,.18);transform:translateY(8px);transition:transform .2s}
.modal-bg.open .modal{transform:translateY(0)}
.modal h3{font-size:15px;font-weight:600;margin-bottom:16px}
.modal label{font-size:12px;font-weight:600;color:var(--text2);display:block;margin-bottom:4px;margin-top:12px}
.modal input{width:100%;padding:8px 12px;border:1px solid var(--border2);border-radius:var(--radius-sm);
  font-size:13px;font-family:'DM Mono',monospace;background:var(--surface2);color:var(--text)}
.modal input:focus{outline:2px solid var(--green);outline-offset:1px}
.modal-btns{display:flex;gap:8px;margin-top:20px;justify-content:flex-end}

#toast{position:fixed;bottom:20px;right:20px;background:#111;color:#fff;
  padding:9px 16px;border-radius:var(--radius);font-size:13px;font-weight:500;
  opacity:0;transform:translateY(5px);transition:all .2s;pointer-events:none;z-index:999}
#toast.show{opacity:1;transform:translateY(0)}
</style>
</head>
<body>
<header>
  <div class="logo">
    <div class="logo-icon">📦</div>
    <div>
      <div class="logo-name">Control de Cubetas</div>
      <div class="logo-sub" id="hdr-mes"></div>
    </div>
  </div>
  <div class="hdr-actions">
    <button class="btn btn-green" onclick="abrirModal()">+ Nuevo cuadro</button>
    <button class="btn btn-blue" onclick="exportarExcel()">↓ Exportar Excel del mes</button>
    <button class="btn btn-red btn-sm" onclick="borrarTodo()">✕ Borrar todo</button>
  </div>
</header>

<div class="wrap" id="wrap"></div>

<div class="modal-bg" id="modal-bg" onclick="clkBg(event)">
  <div class="modal">
    <h3>Nuevo cuadro de control</h3>
    <label>Fecha del cuadro</label>
    <input type="date" id="m-fecha">
    <label>Nota (opcional)</label>
    <input type="text" id="m-nota" placeholder="ej: Segunda salida, semana 3...">
    <div class="modal-btns">
      <button class="btn btn-sm" onclick="cerrarModal()">Cancelar</button>
      <button class="btn btn-green btn-sm" onclick="crearCuadro()">Crear cuadro</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
const ROUTES = ['11','12','52A','52B','18'];
const SHARED  = [['52A','52B']];
const BK      = ['Grises','Grandes','Medianas','Ramo'];
const SK      = 'cubetas_cuadros_v1';

let cuadros = [];

function hoy(){ return new Date().toISOString().split('T')[0]; }
function fmt(d){ if(!d) return '—'; const [y,m,dd]=d.split('-'); return `${dd}/${m}/${y}`; }
function mesLabel(d){ if(!d) return ''; const [y,m]=d.split('-'); const n=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre']; return n[parseInt(m)-1]+' '+y; }
function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,6); }
function partner(r){ const p=SHARED.find(g=>g.includes(r)); return p?p.find(x=>x!==r):null; }
function sumO(rd){ return BK.reduce((t,b)=>t+(parseInt(rd['o_'+b])||0),0); }
function sumI(rd){ return BK.reduce((t,b)=>t+(parseInt(rd['i_'+b])||0),0); }

function load(){ try{ const d=localStorage.getItem(SK); if(d) cuadros=JSON.parse(d)||[]; }catch(e){} }
function persist(){ try{ localStorage.setItem(SK,JSON.stringify(cuadros)); }catch(e){} }

function blankData(){
  const d={};
  ROUTES.forEach(r=>{ d[r]={}; BK.forEach(b=>{ d[r]['o_'+b]=0; d[r]['i_'+b]=0; }); });
  return d;
}

// concordancia: salida del cuadro idx  vs  entrada del cuadro idx+1
function calcConc(idx){
  const cur=cuadros[idx], nxt=cuadros[idx+1];
  const res={};
  ROUTES.forEach(r=>{
    if(!nxt){ res[r]={ok:null,diff:{}}; return; }
    const diffs={};
    let ok=true;
    BK.forEach(b=>{
      const sal=parseInt(cur.data[r]['o_'+b])||0;
      const ent=parseInt(nxt.data[r]['i_'+b])||0;
      diffs[b]=ent-sal;
      if(ent!==sal) ok=false;
    });
    res[r]={ok,diff:diffs};
  });
  return res;
}

// ── RENDER ────────────────────────────────────────────────────
function render(){
  const wrap=document.getElementById('wrap');
  wrap.innerHTML='';

  if(!cuadros.length){
    wrap.innerHTML=`<div style="text-align:center;padding:70px 20px;color:var(--text3)">
      <div style="font-size:48px;margin-bottom:12px">📦</div>
      <div style="font-size:16px;font-weight:600;margin-bottom:6px">Sin cuadros todavía</div>
      <div style="font-size:13px">Pulsa <strong>"+ Nuevo cuadro"</strong> para empezar el control del mes</div>
    </div>`;
    document.getElementById('hdr-mes').textContent='';
    return;
  }

  document.getElementById('hdr-mes').textContent=mesLabel(cuadros[0].fecha);

  cuadros.forEach((c,idx)=>{
    const conc=calcConc(idx);
    const hasNext=!!cuadros[idx+1];

    let concGlobal=null;
    if(hasNext) concGlobal=ROUTES.every(r=>conc[r].ok);

    // badge concordancia
    let badge='';
    if(!hasNext)            badge=`<span class="conc-badge conc-nd">Último cuadro</span>`;
    else if(concGlobal)     badge=`<span class="conc-badge conc-ok">✓ Concordancia OK con cuadro ${idx+2}</span>`;
    else                    badge=`<span class="conc-badge conc-err">✗ Hay diferencias con cuadro ${idx+2}</span>`;

    // totales
    let gtO=0,gtI=0;
    const totO={},totI={};
    BK.forEach(b=>{totO[b]=0;totI[b]=0;});
    ROUTES.forEach(r=>{
      const rd=c.data[r];
      BK.forEach(b=>{ totO[b]+=(parseInt(rd['o_'+b])||0); totI[b]+=(parseInt(rd['i_'+b])||0); });
      gtO+=sumO(rd); gtI+=sumI(rd);
    });

    // filas de rutas
    let tbody='';
    ROUTES.forEach(r=>{
      const rd=c.data[r];
      const isS=!!partner(r), sp=partner(r);
      const so=sumO(rd), si=sumI(rd), diff=si-so;

      let diffHtml='';
      if(so===0&&si===0)    diffHtml=`<span class="diff-pill dp-nd">—</span>`;
      else if(diff===0)     diffHtml=`<span class="diff-pill dp-ok">✓ Exacto</span>`;
      else if(diff>0)       diffHtml=`<span class="diff-pill dp-pos">+${diff} sobran</span>`;
      else                  diffHtml=`<span class="diff-pill dp-neg">${diff} faltan</span>`;

      // ícono concordancia al lado del nombre
      let concIcon='';
      if(hasNext){
        if(conc[r].ok) concIcon=`<span style="color:var(--green-text);font-size:10px;margin-left:3px">✓</span>`;
        else{
          const ds=BK.map(b=>{const v=conc[r].diff[b];return v!==0?`${b}:${v>0?'+':''}${v}`:''}).filter(Boolean).join(' ');
          concIcon=`<span style="color:var(--red-text);font-size:10px;margin-left:3px" title="${ds}">✗</span>`;
        }
      }

      tbody+=`<tr>
        <td class="td-r">
          <span class="rpill">${r}</span>${concIcon}
          ${isS?`<span class="spill">= ${sp}</span>`:''}
        </td>`;

      BK.forEach(b=>{
        tbody+=`<td style="background:#fffaf9"><div class="cell-p inp-o">
          <input type="number" class="num-input" min="0" value="${parseInt(rd['o_'+b])||0}"
            onblur="setV('${c.id}','${r}','o_${b}',this.value)"
            onkeydown="if(event.key==='Enter')this.blur()">
        </div></td>`;
      });
      tbody+=`<td class="td-so">${so}</td>`;

      BK.forEach(b=>{
        tbody+=`<td style="background:#f8fcf9"><div class="cell-p inp-i">
          <input type="number" class="num-input" min="0" value="${parseInt(rd['i_'+b])||0}"
            onblur="setV('${c.id}','${r}','i_${b}',this.value)"
            onkeydown="if(event.key==='Enter')this.blur()">
        </div></td>`;
      });
      tbody+=`<td class="td-si">${si}</td>`;
      tbody+=`<td class="td-df">${diffHtml}</td></tr>`;
    });

    // fila total del cuadro
    const gd=gtI-gtO;
    const gdTxt=gd===0?'✓ Exacto':gd>0?`+${gd} sobran`:`${gd} faltan`;
    const gdCol=gd===0?'#6ee7b7':gd>0?'#f9a8d4':'#fca5a5';
    let tfoot=`<tr class="tr-tot-c">
      <td class="td-rl">TOTAL CUADRO</td>`;
    BK.forEach(b=>tfoot+=`<td style="color:#fca5a5">${totO[b]}</td>`);
    tfoot+=`<td style="color:#fcd34d;font-size:14px">${gtO}</td>`;
    BK.forEach(b=>tfoot+=`<td style="color:#86efac">${totI[b]}</td>`);
    tfoot+=`<td style="color:#6ee7b7;font-size:14px">${gtI}</td>`;
    tfoot+=`<td style="color:${gdCol};font-weight:700">${gdTxt}</td></tr>`;

    // detalle concordancia (solo si hay diffs)
    let concDetail='';
    if(hasNext && !concGlobal){
      const items=ROUTES.map(r=>{
        const cr=conc[r];
        if(cr.ok) return `<span class="conc-item"><span class="conc-ri">${r}</span><span class="ci-ok">✓</span></span>`;
        const ds=BK.map(b=>{ const v=cr.diff[b]; return v!==0?`${b}: ${v>0?'+':''}${v}`:''; }).filter(Boolean).join(', ');
        return `<span class="conc-item"><span class="conc-ri">${r}</span><span class="ci-err">✗ ${ds||'diferente'}</span></span>`;
      }).join('');
      concDetail=`<div class="conc-detail">
        <strong style="color:var(--amber-text)">Diferencias vs cuadro ${idx+2}:</strong>${items}
      </div>`;
    }

    const div=document.createElement('div');
    div.className='cuadro';
    div.innerHTML=`
      <div class="cuadro-head">
        <span class="cuadro-num">CUADRO ${idx+1}</span>
        <span class="cuadro-fecha">📅 ${fmt(c.fecha)}</span>
        ${c.nota?`<span class="cuadro-nota">${c.nota}</span>`:''}
        ${badge}
        <div class="cuadro-actions">
          <button class="btn btn-amber btn-xs" onclick="editFecha('${c.id}')">✎ Fecha/nota</button>
          <button class="btn btn-red btn-xs" onclick="eliminar('${c.id}')">✕ Eliminar</button>
        </div>
      </div>
      <div class="tscroll">
        <table class="ct">
          <thead>
            <tr>
              <th class="th-r" rowspan="2">Ruta</th>
              <th class="sec-o" colspan="4">↑ SALEN</th>
              <th class="sec-o" style="background:#ffecea">Subtotal</th>
              <th class="sec-i" colspan="4">↓ ENTRAN</th>
              <th class="sec-i" style="background:#e4f5ea">Subtotal</th>
              <th class="sec-d" rowspan="2">Diferencia<br><span style="font-size:9px;font-weight:400">(Entran − Salen)</span></th>
            </tr>
            <tr>
              ${BK.map(b=>`<th class="sec-o">${b}</th>`).join('')}
              ${BK.map(b=>`<th class="sec-i">${b}</th>`).join('')}
            </tr>
          </thead>
          <tbody>${tbody}</tbody>
          <tfoot>${tfoot}</tfoot>
        </table>
      </div>
      ${concDetail}`;
    wrap.appendChild(div);

    if(idx < cuadros.length-1){
      const sep=document.createElement('div');
      sep.className='sep-arrow';
      sep.innerHTML=`<div class="sep-line"></div>
        <span>↓ &nbsp; La salida del cuadro ${idx+1} debe coincidir con la entrada del cuadro ${idx+2} &nbsp; ↓</span>
        <div class="sep-line"></div>`;
      wrap.appendChild(sep);
    }
  });

  const add=document.createElement('div');
  add.className='add-panel';
  add.onclick=abrirModal;
  add.innerHTML=`<span style="font-size:24px;color:var(--green)">+</span><span class="add-panel-txt">Agregar nuevo cuadro de control</span>`;
  wrap.appendChild(add);
}

// ── ACCIONES ──────────────────────────────────────────────────
function setV(id,r,campo,val){
  const c=cuadros.find(x=>x.id===id);
  if(!c) return;
  const v=Math.max(0,parseInt(val)||0);
  c.data[r][campo]=v;
  const sp=partner(r);
  if(sp) c.data[sp][campo]=v;
  persist(); render();
}

function crearCuadro(){
  const fecha=document.getElementById('m-fecha').value;
  const nota=document.getElementById('m-nota').value.trim();
  if(!fecha){ toast('Selecciona una fecha'); return; }
  cuadros.push({id:uid(),fecha,nota,data:blankData()});
  persist(); cerrarModal(); render();
  toast(`✓ Cuadro ${cuadros.length} creado — ${fmt(fecha)}`);
}

function eliminar(id){
  const idx=cuadros.findIndex(x=>x.id===id);
  if(!confirm(`¿Eliminar el cuadro ${idx+1}?`)) return;
  cuadros=cuadros.filter(x=>x.id!==id);
  persist(); render(); toast('Cuadro eliminado');
}

function editFecha(id){
  const c=cuadros.find(x=>x.id===id);
  const nf=prompt('Nueva fecha (AAAA-MM-DD):',c.fecha);
  if(nf) c.fecha=nf;
  const nn=prompt('Nota (dejar vacío para borrar):',c.nota||'');
  if(nn!==null) c.nota=nn;
  persist(); render();
}

function borrarTodo(){
  if(!confirm('¿Borrar TODOS los cuadros?')) return;
  cuadros=[]; persist(); render(); toast('Todo borrado');
}

// ── MODAL ─────────────────────────────────────────────────────
function abrirModal(){
  document.getElementById('m-fecha').value=hoy();
  document.getElementById('m-nota').value='';
  document.getElementById('modal-bg').classList.add('open');
  setTimeout(()=>document.getElementById('m-fecha').focus(),150);
}
function cerrarModal(){ document.getElementById('modal-bg').classList.remove('open'); }
function clkBg(e){ if(e.target===document.getElementById('modal-bg')) cerrarModal(); }

// ── EXPORT ────────────────────────────────────────────────────
function exportarExcel(){
  if(!cuadros.length){ toast('No hay cuadros para exportar'); return; }
  const wb=XLSX.utils.book_new();
  const w=v=>({wch:v});

  // Hoja resumen
  const hd=['Cuadro','Fecha','Nota','Ruta',
    'Gr.Sal','Gd.Sal','Med.Sal','Ram.Sal','Total SAL',
    'Gr.Ent','Gd.Ent','Med.Ent','Ram.Ent','Total ENT',
    'Diferencia','Concordancia con sig. cuadro'];
  const rows=[hd];

  cuadros.forEach((c,idx)=>{
    const conc=calcConc(idx);
    const hasNext=!!cuadros[idx+1];
    ROUTES.forEach(r=>{
      const rd=c.data[r];
      const so=sumO(rd),si=sumI(rd),diff=si-so;
      let concStr='—';
      if(hasNext) concStr=conc[r].ok?'OK':BK.map(b=>{ const v=conc[r].diff[b]; return v!==0?`${b}:${v>0?'+':''}${v}`:''; }).filter(Boolean).join(' ')||'OK';
      rows.push([`Cuadro ${idx+1}`,fmt(c.fecha),c.nota||'',r,
        parseInt(rd['o_Grises'])||0,parseInt(rd['o_Grandes'])||0,parseInt(rd['o_Medianas'])||0,parseInt(rd['o_Ramo'])||0,so,
        parseInt(rd['i_Grises'])||0,parseInt(rd['i_Grandes'])||0,parseInt(rd['i_Medianas'])||0,parseInt(rd['i_Ramo'])||0,si,
        diff===0?'Exacto':diff>0?`+${diff} sobran`:`${diff} faltan`,concStr]);
    });
    // subtotal cuadro
    let gtO=0,gtI=0;
    const tO={},tI={};
    BK.forEach(b=>{tO[b]=0;tI[b]=0;});
    ROUTES.forEach(r=>{
      const rd=c.data[r];
      BK.forEach(b=>{ tO[b]+=(parseInt(rd['o_'+b])||0); tI[b]+=(parseInt(rd['i_'+b])||0); });
      gtO+=sumO(rd); gtI+=sumI(rd);
    });
    const gd=gtI-gtO;
    rows.push([`Cuadro ${idx+1}`,fmt(c.fecha),c.nota||'','— TOTAL —',
      tO.Grises,tO.Grandes,tO.Medianas,tO.Ramo,gtO,
      tI.Grises,tI.Grandes,tI.Medianas,tI.Ramo,gtI,
      gd===0?'Exacto':gd>0?`+${gd} sobran`:`${gd} faltan`,'']);
    rows.push(['','','','','','','','','','','','','','','','']);
  });

  const ws=XLSX.utils.aoa_to_sheet(rows);
  ws['!cols']=[10,12,16,10,8,8,8,8,10,8,8,8,8,10,14,22].map(w);
  XLSX.utils.book_append_sheet(wb,ws,'Resumen del mes');

  // Hoja por ruta
  ROUTES.forEach(r=>{
    const rh=['Cuadro','Fecha','Nota','Gr.Sal','Gd.Sal','Med.Sal','Ram.Sal','Total SAL','Gr.Ent','Gd.Ent','Med.Ent','Ram.Ent','Total ENT','Diferencia','Concordancia'];
    const rd2=[rh];
    cuadros.forEach((c,idx)=>{
      const rd=c.data[r];
      const so=sumO(rd),si=sumI(rd),diff=si-so;
      const conc=calcConc(idx);
      const hasNext=!!cuadros[idx+1];
      let concStr='—';
      if(hasNext) concStr=conc[r].ok?'OK':BK.map(b=>{ const v=conc[r].diff[b]; return v!==0?`${b}:${v>0?'+':''}${v}`:''; }).filter(Boolean).join(' ')||'OK';
      rd2.push([`Cuadro ${idx+1}`,fmt(c.fecha),c.nota||'',
        parseInt(rd['o_Grises'])||0,parseInt(rd['o_Grandes'])||0,parseInt(rd['o_Medianas'])||0,parseInt(rd['o_Ramo'])||0,so,
        parseInt(rd['i_Grises'])||0,parseInt(rd['i_Grandes'])||0,parseInt(rd['i_Medianas'])||0,parseInt(rd['i_Ramo'])||0,si,
        diff===0?'Exacto':diff>0?`+${diff} sobran`:`${diff} faltan`,concStr]);
    });
    const rws2=XLSX.utils.aoa_to_sheet(rd2);
    rws2['!cols']=[10,12,14,8,8,8,8,10,8,8,8,8,10,14,14].map(w);
    XLSX.utils.book_append_sheet(wb,rws2,'Ruta '+r);
  });

  const mes=cuadros[0].fecha.slice(0,7);
  XLSX.writeFile(wb,`cubetas_${mes}.xlsx`);
  toast('✓ Excel exportado');
}

// ── TOAST ─────────────────────────────────────────────────────
function toast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg; el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),2800);
}

// ── INIT ──────────────────────────────────────────────────────
load();
render();
</script>
